name: FlapDash
options:
  bundleIdPrefix: com.solvy
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  ArcadeCore:
    path: ../ArcadeCore

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: PY8XQ9L8AA
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO

targets:
  FlapDash:
    type: application
    platform: iOS
    info:
      path: FlapDash-Info.plist
      properties:
        CFBundleDisplayName: Flap Dash
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleLocalizations:
          - en
          - ar
          - bg
          - ca
          - cs
          - da
          - de
          - el
          - es
          - es-419
          - fi
          - fil
          - fr
          - fr-CA
          - he
          - hi
          - hr
          - hu
          - id
          - it
          - ja
          - ko
          - ms
          - nb
          - nl
          - pl
          - pt-BR
          - pt-PT
          - ro
          - ru
          - sk
          - sl
          - sr
          - sv
          - th
          - tr
          - uk
          - vi
          - zh-Hans
          - zh-Hant
        UIStatusBarHidden: true
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        GADApplicationIdentifier: ca-app-pub-3940256099942544~1458002511
        NSUserTrackingUsageDescription: This lets us show ads relevant to you, which keeps the game free.
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: 3qcr597p9d.skadnetwork
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: ArcadeCore
        product: ArcadeCore
      - package: ArcadeCore
        product: ArcadeCoreAdMob
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solvy.flapdash
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: FlapDash.entitlements

schemes:
  FlapDash:
    build:
      targets:
        FlapDash: all
    run:
      config: Debug
      storeKitConfiguration: Products.storekit
    archive:
      config: Release
